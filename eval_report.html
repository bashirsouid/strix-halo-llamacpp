<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Strix Halo Eval Results</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e17; color: #c9d1d9;
    font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
    padding: 24px;
  }
  .container { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 22px; color: #58a6ff; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #6e7681; margin-bottom: 24px; }
  .chart-box {
    background: #0d1117; border: 1px solid #21262d;
    border-radius: 8px; padding: 20px; margin-bottom: 24px;
  }
  .chart-box h2 {
    font-size: 14px; font-weight: 600; color: #f0f6fc;
    margin-bottom: 12px;
  }
  canvas { max-height: 350px; }
</style>
</head>
<body>
<div class="container">
  <h1>🧪 Strix Halo Eval Results</h1>
  <p class="subtitle">
    1 records &middot;
    1 model/backend/suite combos &middot;
    1 sessions
  </p>

  <div class="chart-box">
    <h2>Eval wall time over time (seconds)</h2>
    <canvas id="lineChart"></canvas>
  </div>
</div>

<script>
Chart.defaults.color = '#6e7681';
Chart.defaults.borderColor = '#21262d';

new Chart(document.getElementById('lineChart'), {
  type: 'line',
  data: {
    labels: ["2026-04-03 09:07"],
    datasets: [{
            label: "nemotron-nano-q4 (rocm, humaneval) [Q4_K_M]",
            data: [2135.4],
            borderColor: '#e63946',
            backgroundColor: '#e6394633',
            borderWidth: 2,
            pointRadius: 4,
            pointHoverRadius: 6,
            tension: 0.2,
            spanGaps: true,
        }]
  },
  options: {
    responsive: true,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { labels: { font: { size: 11 }, usePointStyle: true, pointStyle: 'circle' } },
      tooltip: {
        backgroundColor: '#161b22',
        borderColor: '#30363d',
        borderWidth: 1,
        titleFont: { size: 12 },
        bodyFont: { size: 12 },
        callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + ' s' }
      }
    },
    scales: {
      x: { ticks: { font: { size: 10 }, maxRotation: 45 } },
      y: {
        beginAtZero: true,
        title: { display: true, text: 'Wall time (s)', font: { size: 11 } },
        ticks: { font: { size: 11 } }
      }
    }
  }
});
</script>
</body>
</html>
