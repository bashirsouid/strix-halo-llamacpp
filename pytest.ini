[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    parallel: Parallelization tests
    performance: Performance benchmarks
    integration: Integration tests
    slow: Slow tests that require full build/download
    real_world: Real-world scenarios with tiny model

# Parallel execution
norecursedirs = .git .venv build llama.cpp

# Coverage (optional)
# addopts = --cov=server --cov=models --cov-report=term-missing
