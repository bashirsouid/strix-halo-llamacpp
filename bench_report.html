<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Strix Halo Bench Results</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e17; color: #c9d1d9;
    font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
    padding: 24px;
  }
  .container { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 22px; color: #58a6ff; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #6e7681; margin-bottom: 24px; }
  .stats {
    display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .stat {
    background: #161b22; border: 1px solid #21262d;
    border-radius: 6px; padding: 10px 16px; flex: 1 1 100px;
  }
  .stat-value { font-size: 20px; font-weight: 700; color: #f0f6fc; }
  .stat-label {
    font-size: 11px; color: #6e7681;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .chart-box {
    background: #0d1117; border: 1px solid #21262d;
    border-radius: 8px; padding: 20px; margin-bottom: 24px;
  }
  .chart-box h2 {
    font-size: 14px; font-weight: 600; color: #f0f6fc;
    margin-bottom: 12px;
  }
  canvas { max-height: 350px; }
</style>
</head>
<body>
<div class="container">
  <h1>⚡ Strix Halo Bench Results</h1>
  <p class="subtitle">
    2 records &middot;
    2 model+backend combos &middot;
    2 sessions
  </p>

  <div class="stats">
    <div class="stat">
      <div class="stat-value">2</div>
      <div class="stat-label">Records</div>
    </div>
    <div class="stat">
      <div class="stat-value">2</div>
      <div class="stat-label">Models</div>
    </div>
    <div class="stat">
      <div class="stat-value">2</div>
      <div class="stat-label">Sessions</div>
    </div>
    <div class="stat">
      <div class="stat-value">1</div>
      <div class="stat-label">Backends</div>
    </div>
  </div>

  <div class="chart-box">
    <h2>tok/s over time</h2>
    <canvas id="lineChart"></canvas>
  </div>

  <div class="chart-box">
    <h2>Latest results (ranked)</h2>
    <canvas id="barChart"></canvas>
  </div>
</div>

<script>
Chart.defaults.color = '#6e7681';
Chart.defaults.borderColor = '#21262d';

new Chart(document.getElementById('lineChart'), {
  type: 'line',
  data: {
    labels: ["2026-03-31 08:04", "2026-03-31 08:14"],
    datasets: [{
            label: "mistral-small-4-q4 [UD-Q4_K_M] (radv)",
            data: [null, 22.9],
            borderColor: '#e63946',
            backgroundColor: '#e6394633',
            borderWidth: 2,
            borderDash: [],
            pointRadius: 4,
            pointHoverRadius: 6,
            tension: 0.2,
            spanGaps: true,
        }, {
            label: "nemotron-nano-q8 [UD-Q8_K_XL] (radv)",
            data: [43.8, null],
            borderColor: '#457b9d',
            backgroundColor: '#457b9d33',
            borderWidth: 2,
            borderDash: [],
            pointRadius: 4,
            pointHoverRadius: 6,
            tension: 0.2,
            spanGaps: true,
        }]
  },
  options: {
    responsive: true,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { labels: { font: { size: 11 }, usePointStyle: true, pointStyle: 'circle' } },
      tooltip: {
        backgroundColor: '#161b22',
        borderColor: '#30363d',
        borderWidth: 1,
        titleFont: { size: 12 },
        bodyFont: { size: 12 },
        callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + ' tok/s' }
      }
    },
    scales: {
      x: { ticks: { font: { size: 10 }, maxRotation: 45 } },
      y: {
        beginAtZero: true,
        title: { display: true, text: 'tok/s', font: { size: 11 } },
        ticks: { font: { size: 11 } }
      }
    }
  }
});

new Chart(document.getElementById('barChart'), {
  type: 'bar',
  data: {
    labels: ["nemotron-nano-q8 [UD-Q8_K_XL] (radv)", "mistral-small-4-q4 [UD-Q4_K_M] (radv)"],
    datasets: [{
      data: [43.8, 22.9],
      backgroundColor: ["#e63946", "#457b9d"],
      borderRadius: 4,
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#161b22',
        borderColor: '#30363d',
        borderWidth: 1,
        callbacks: { label: ctx => ctx.parsed.x + ' tok/s' }
      }
    },
    scales: {
      x: {
        beginAtZero: true,
        title: { display: true, text: 'tok/s', font: { size: 11 } },
        ticks: { font: { size: 11 } }
      },
      y: { ticks: { font: { size: 11 } } }
    }
  }
});
</script>
</body>
</html>
