<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Strix Halo Bench Results</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e17; color: #c9d1d9;
    font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
    padding: 24px;
  }
  .container { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 22px; color: #58a6ff; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #6e7681; margin-bottom: 24px; }
  .stats {
    display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .stat {
    background: #161b22; border: 1px solid #21262d;
    border-radius: 6px; padding: 10px 16px; flex: 1 1 100px;
  }
  .stat-value { font-size: 20px; font-weight: 700; color: #f0f6fc; }
  .stat-label {
    font-size: 11px; color: #6e7681;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .chart-box {
    background: #0d1117; border: 1px solid #21262d;
    border-radius: 8px; padding: 20px; margin-bottom: 24px;
  }
  .chart-box h2 {
    font-size: 14px; font-weight: 600; color: #f0f6fc;
    margin-bottom: 12px;
  }
  canvas { max-height: 350px; }
</style>
</head>
<body>
<div class="container">
  <h1>⚡ Strix Halo Bench Results</h1>
  <p class="subtitle">
    13 records &middot;
    10 model+backend combos &middot;
    11 sessions
  </p>

  <div class="stats">
    <div class="stat">
      <div class="stat-value">13</div>
      <div class="stat-label">Records</div>
    </div>
    <div class="stat">
      <div class="stat-value">6</div>
      <div class="stat-label">Models</div>
    </div>
    <div class="stat">
      <div class="stat-value">11</div>
      <div class="stat-label">Sessions</div>
    </div>
    <div class="stat">
      <div class="stat-value">2</div>
      <div class="stat-label">Backends</div>
    </div>
  </div>

  <div class="chart-box">
    <h2>tok/s over time</h2>
    <canvas id="lineChart"></canvas>
  </div>

  <div class="chart-box">
    <h2>Latest results (ranked)</h2>
    <canvas id="barChart"></canvas>
  </div>
</div>

<script>
Chart.defaults.color = '#6e7681';
Chart.defaults.borderColor = '#21262d';

new Chart(document.getElementById('lineChart'), {
  type: 'line',
  data: {
    labels: ["2026-03-30 18:11", "2026-03-30 21:16", "2026-03-30 21:25", "2026-03-30 21:30", "2026-03-30 21:32", "2026-03-30 21:33", "2026-03-30 21:37", "2026-03-30 21:42", "2026-03-30 21:44", "2026-03-30 21:46", "2026-03-30 22:14"],
    datasets: [{
            label: "glm-4.5-air (radv)",
            data: [23.0, null, null, null, null, null, null, null, null, null, null],
            borderColor: '#e63946',
            backgroundColor: '#e6394633',
            borderWidth: 2,
            borderDash: [],
            pointRadius: 4,
            pointHoverRadius: 6,
            tension: 0.2,
            spanGaps: true,
        }, {
            label: "glm-4.7-flash (amdvlk)",
            data: [null, null, null, null, null, null, null, null, null, 36.5, null],
            borderColor: '#457b9d',
            backgroundColor: '#457b9d33',
            borderWidth: 2,
            borderDash: [6, 3],
            pointRadius: 4,
            pointHoverRadius: 6,
            tension: 0.2,
            spanGaps: true,
        }, {
            label: "glm-4.7-flash (radv)",
            data: [null, null, null, null, null, 36.5, null, null, null, null, null],
            borderColor: '#2a9d8f',
            backgroundColor: '#2a9d8f33',
            borderWidth: 2,
            borderDash: [],
            pointRadius: 4,
            pointHoverRadius: 6,
            tension: 0.2,
            spanGaps: true,
        }, {
            label: "mistral-small-4-119b (amdvlk)",
            data: [null, null, null, null, null, null, 25.8, null, null, null, null],
            borderColor: '#e9c46a',
            backgroundColor: '#e9c46a33',
            borderWidth: 2,
            borderDash: [6, 3],
            pointRadius: 4,
            pointHoverRadius: 6,
            tension: 0.2,
            spanGaps: true,
        }, {
            label: "mistral-small-4-119b (radv)",
            data: [27.2, null, 26.8, null, null, null, null, null, null, null, null],
            borderColor: '#f4a261',
            backgroundColor: '#f4a26133',
            borderWidth: 2,
            borderDash: [],
            pointRadius: 4,
            pointHoverRadius: 6,
            tension: 0.2,
            spanGaps: true,
        }, {
            label: "nemotron-3-super-120b (amdvlk)",
            data: [null, null, null, null, null, null, null, 12.2, null, null, null],
            borderColor: '#264653',
            backgroundColor: '#26465333',
            borderWidth: 2,
            borderDash: [6, 3],
            pointRadius: 4,
            pointHoverRadius: 6,
            tension: 0.2,
            spanGaps: true,
        }, {
            label: "nemotron-3-super-120b (radv)",
            data: [12.2, null, null, 12.1, null, null, null, null, null, null, null],
            borderColor: '#a8dadc',
            backgroundColor: '#a8dadc33',
            borderWidth: 2,
            borderDash: [],
            pointRadius: 4,
            pointHoverRadius: 6,
            tension: 0.2,
            spanGaps: true,
        }, {
            label: "nemotron-nano (radv)",
            data: [null, null, null, null, null, null, null, null, null, null, 43.1],
            borderColor: '#6d6875',
            backgroundColor: '#6d687533',
            borderWidth: 2,
            borderDash: [],
            pointRadius: 4,
            pointHoverRadius: 6,
            tension: 0.2,
            spanGaps: true,
        }, {
            label: "qwen3-coder-next (amdvlk)",
            data: [null, null, null, null, null, null, null, null, 39.6, null, null],
            borderColor: '#b5838d',
            backgroundColor: '#b5838d33',
            borderWidth: 2,
            borderDash: [6, 3],
            pointRadius: 4,
            pointHoverRadius: 6,
            tension: 0.2,
            spanGaps: true,
        }, {
            label: "qwen3-coder-next (radv)",
            data: [null, 38.6, null, null, 39.6, null, null, null, null, null, null],
            borderColor: '#ffb703',
            backgroundColor: '#ffb70333',
            borderWidth: 2,
            borderDash: [],
            pointRadius: 4,
            pointHoverRadius: 6,
            tension: 0.2,
            spanGaps: true,
        }]
  },
  options: {
    responsive: true,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { labels: { font: { size: 11 }, usePointStyle: true, pointStyle: 'circle' } },
      tooltip: {
        backgroundColor: '#161b22',
        borderColor: '#30363d',
        borderWidth: 1,
        titleFont: { size: 12 },
        bodyFont: { size: 12 },
        callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + ' tok/s' }
      }
    },
    scales: {
      x: { ticks: { font: { size: 10 }, maxRotation: 45 } },
      y: {
        beginAtZero: true,
        title: { display: true, text: 'tok/s', font: { size: 11 } },
        ticks: { font: { size: 11 } }
      }
    }
  }
});

new Chart(document.getElementById('barChart'), {
  type: 'bar',
  data: {
    labels: ["nemotron-nano (radv)", "qwen3-coder-next (radv)", "qwen3-coder-next (amdvlk)", "glm-4.7-flash (radv)", "glm-4.7-flash (amdvlk)", "mistral-small-4-119b (radv)", "mistral-small-4-119b (amdvlk)", "glm-4.5-air (radv)", "nemotron-3-super-120b (amdvlk)", "nemotron-3-super-120b (radv)"],
    datasets: [{
      data: [43.1, 39.6, 39.6, 36.5, 36.5, 26.8, 25.8, 23.0, 12.2, 12.1],
      backgroundColor: ["#e63946", "#457b9d", "#2a9d8f", "#e9c46a", "#f4a261", "#264653", "#a8dadc", "#6d6875", "#b5838d", "#ffb703"],
      borderRadius: 4,
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#161b22',
        borderColor: '#30363d',
        borderWidth: 1,
        callbacks: { label: ctx => ctx.parsed.x + ' tok/s' }
      }
    },
    scales: {
      x: {
        beginAtZero: true,
        title: { display: true, text: 'tok/s', font: { size: 11 } },
        ticks: { font: { size: 11 } }
      },
      y: { ticks: { font: { size: 11 } } }
    }
  }
});
</script>
</body>
</html>
