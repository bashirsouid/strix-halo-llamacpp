# llama.cpp on Strix Halo — kyuz0/amd-strix-halo-toolboxes rocm-7alpha-rocwmma-improved
# Usage: ./start_llamacpp.sh / ./stop_llamacpp.sh

services:
  llama:
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7alpha-rocwmma-improved
    container_name: strix-llamacpp-rocm
    restart: "no"

    entrypoint: ["llama-server"]

    command:
      - "-m"
      - "${MODEL_PATH:-/mnt/data/llama.cpp-cache/hf/hub/models--unsloth--Llama-3.1-Nemotron-Nano-8B-v1-GGUF/snapshots/d4b185dad118067300efd1b12498dad3a3358496/Llama-3.1-Nemotron-Nano-8B-v1-Q4_K_M.gguf}"
      - "-ngl"
      - "${LLAMA_NGL:-999}"
      - "-fa"
      - "on"
      - "-fit"
      - "off"
      - "--parallel"
      - "1"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "${SERVER_PORT:-8000}"
      - "--ctx-size"
      - "${LLAMA_CTX_SIZE:-32768}"
      - "--threads"
      - "${LLAMA_THREADS:-16}"
      - "-a"
      - "${MODEL_ALIAS:-nemotron-nano-8b}"

    devices:
      - "/dev/dri:/dev/dri"
      - "/dev/kfd:/dev/kfd"

    group_add:
      - "video"
      - "render"

    security_opt:
      - "seccomp:unconfined"

    ipc: "host"
    cap_add:
      - "SYS_PTRACE"

    ulimits:
      memlock:
        soft: -1
        hard: -1

    environment:
      HSA_ENABLE_SDMA: "0"
      ROCR_VISIBLE_DEVICES: "0"
      GPU_MAX_HW_QUEUES: "2"

    volumes:
      - "/mnt/data:/mnt/data"

    ports:
      - "${SERVER_PORT:-8000}:8000"